name: Bug report
description: Report a bug in templates, scripts, or propagation logic
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - templates/typescript
        - templates/python
        - scripts/ (apply-templates / audit / propagate / sync)
        - scripts/lib/ecosystem-config.mjs (renderer)
        - server-inventory.json
        - docs (STANDARDS.md / PUBLISHING.md)
        - other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `./scripts/...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      render: shell
    validations:
      required: false
