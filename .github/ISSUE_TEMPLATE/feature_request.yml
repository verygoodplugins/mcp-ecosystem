name: Feature request
description: Suggest a template, script, or workflow improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve across the ecosystem?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change in templates / scripts / docs?
    validations:
      required: true
  - type: textarea
    id: downstream
    attributes:
      label: Downstream impact
      description: Which template tiers or server profiles would this touch?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
