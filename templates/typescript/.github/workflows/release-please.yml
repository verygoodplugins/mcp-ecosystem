# Release Please - Automated versioning and dual-registry publishing
#
# How it works:
# 1. Every push to main with conventional commits updates a "Release PR"
# 2. When you merge the Release PR, it:
#    - Updates version in package.json
#    - Updates CHANGELOG.md
#    - Creates a GitHub Release with tag
#    - Triggers npm publish (primary) + GitHub Packages publish (mirror)
#
# Commit message format:
#   feat: add new feature          → minor version bump
#   fix: fix a bug                 → patch version bump
#   feat!: breaking change         → major version bump
#   chore/docs: no version bump
#
# npm Publishing (primary install path):
#   Uses Trusted Publishing (OIDC) - no NPM_TOKEN needed.
#   Requires Node 24+ for npm 11.5.1+ OIDC support.
#   Configure at: https://www.npmjs.com/package/@verygoodplugins/<package-name>/access
#
# GitHub Packages (org mirror):
#   Same tarball pushed to npm.pkg.github.com using GITHUB_TOKEN.
#   Mirror only — npmjs stays the default install path because GH Packages
#   requires a PAT with read:packages even for public packages.
#   Failures here do NOT fail the release (continue-on-error).
#
# RELEASE_PLEASE_TOKEN:
#   Uses org-level PAT so the Release PR triggers CI workflows.
#   PRs created by GITHUB_TOKEN don't trigger other workflows (GitHub security).

name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          manifest-file: ".release-please-manifest.json"
          config-file: "release-please-config.json"
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  npm-publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Use npm install for cross-version lockfile compatibility
      - run: npm install
      - run: npm run build
      - run: npm test

      # Trusted Publishing: No NPM_TOKEN needed!
      - run: npm publish --provenance --access public

  gh-packages-publish:
    needs: [release-please, npm-publish]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@verygoodplugins"

      - run: npm install
      - run: npm run build

      # GitHub Packages auth uses GITHUB_TOKEN; no provenance support there.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
